<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke of the Day</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .joke-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .joke {
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        .author {
            font-size: 1em;
            color: #555;
        }         
        .next-button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .next-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>  
    <div class="joke-container">
        <div class="joke"></div>
        <div class="author"></div>
        <button class="next-button" id="nextButton">Next Joke</button>
    </div>
    <script src="joke-otd.js?v=1"></script>
</body>
</html>
